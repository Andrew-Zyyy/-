<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>周宇 | Personal Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="video-bg" aria-hidden="true">
      <video id="bg-video-a" class="bg-video-layer is-active" autoplay muted playsinline preload="auto">
        <source src="{{ url_for('static', filename='media/bg.mp4') }}" type="video/mp4" />
      </video>
      <video id="bg-video-b" class="bg-video-layer" autoplay muted playsinline preload="auto">
        <source src="{{ url_for('static', filename='media/bg.mp4') }}" type="video/mp4" />
      </video>
      <div class="video-mask"></div>
    </div>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div id="page-content" class="page-content is-hidden">
      <header class="topbar glass">
        <div class="brand">Andrew Zhou</div>
        <div class="top-actions">
          <button id="view-toggle" class="btn ghost icon-btn" type="button"></button>
          <button id="switch-user" class="btn ghost icon-btn" type="button"></button>
          <button id="lang-toggle" class="btn ghost icon-btn" type="button"></button>
          <button id="theme-toggle" class="btn ghost icon-btn" type="button"></button>
        </div>
      </header>

      <div id="resume-sections">
        <main class="container">
          <section class="hero glass">
            <p class="eyebrow" id="hero-eyebrow"></p>
            <h1 id="hero-name"></h1>
            <p class="hero-subtitle" id="hero-title"></p>
            <p class="hero-summary" id="hero-summary"></p>

            <div class="contact-row">
              <a id="hero-email" href="#"></a>
              <span class="dot"></span>
              <a id="hero-tel" href="#"></a>
            </div>

            <div class="hero-actions">
              <button id="like-button" class="btn primary" type="button"></button>
              <span class="like-hint" id="like-total"></span>
            </div>
          </section>

          <section class="card glass">
            <h2 id="education-title"></h2>
            <div id="education-list"></div>
          </section>

          <section class="card glass">
            <h2 id="experience-title"></h2>
            <div id="experience-list"></div>
          </section>

          <section class="grid-two">
            <section class="card glass">
              <h2 id="skill-title"></h2>
              <div id="skill-list"></div>
            </section>
            <section class="card glass">
              <h2 id="competition-title"></h2>
              <div id="competition-list"></div>
            </section>
          </section>
        </main>

        <aside class="like-feed glass">
          <div class="feed-head">
            <h3 id="feed-title"></h3>
            <button id="feed-toggle" class="btn ghost icon-btn" type="button"></button>
          </div>
          <ul id="feed-list"></ul>
        </aside>
      </div>
    </div>

    <div id="login-modal" class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <form id="login-form" class="login-card glass">
        <h2 id="login-title"></h2>
        <p id="login-desc"></p>
        <label class="sr-only" for="login-name">visitor name</label>
        <input id="login-name" type="text" maxlength="24" name="visitorName" autocomplete="name" />
        <button id="login-submit" class="btn primary" type="submit"></button>
        <p id="login-error" class="login-error"></p>
      </form>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>
